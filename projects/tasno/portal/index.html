<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tasno 管理者ポータル</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=M+PLUS+1p:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header">
    <div class="header-container">
      <a href="/projects/tasno" class="site-title">Tasno</a>
    </div>
  </header>

  <main class="main-content">
    <div class="auth-card">
      <h2>管理者ポータル</h2>
      <p class="auth-description">グループ登録時に表示されるグループIDを入力してください。</p>
      
      <div class="form-group">
        <label for="groupId">グループID</label>
        <input type="text" id="groupId" placeholder="Ca1234567890..." autocomplete="off">
      </div>
      
      <button onclick="login()" class="btn-primary">ログイン</button>
      <p id="error" class="error-message"></p>
    </div>
  </main>

  <script src="app.js"></script>
</body>
</html>
