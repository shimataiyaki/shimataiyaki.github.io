<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-8YKEHE7RWF"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-8YKEHE7RWF');
</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>
{% if page.title %}
  {{ page.title }}
  {% unless page.title_suffix == false %} | {{ site.title }}{% endunless %}
{% else %}
  {{ site.title }}
{% endif %}
</title>
<meta name="description" content="{{ page.description | default: site.description }}">

<!-- OGP共通 -->
<meta property="og:type" content="{% if page.og_type %}{{ page.og_type }}{% else %}website{% endif %}">
<meta property="og:url" content="{{ page.url | absolute_url }}">
<meta property="og:image" content="{{ page.og_image | default: '/images/ogp.png' | absolute_url }}">
<meta property="og:site_name" content="{{ site.title }}">
{% if page.og_title %}
<meta property="og:title" content="{{ page.og_title }}">
{% else %}
<meta property="og:title" content="{{ page.title }} | {{ site.title }}">
{% endif %}
<meta property="og:description" content="{{ page.description | default: site.description }}">

<!-- Twitterカード共通 -->
<meta name="twitter:card" content="summary_large_image">
{% if page.twitter_title %}
<meta name="twitter:title" content="{{ page.twitter_title }}">
{% else %}
<meta name="twitter:title" content="{{ page.title }} | {{ site.title }}">
{% endif %}
<meta name="twitter:description" content="{{ page.description | default: site.description }}">
<meta name="twitter:image" content="{{ page.og_image | default: '/images/ogp.png' | absolute_url }}">

<link rel="icon" type="image/x-icon" href="{{ '/images/favicon.ico' | absolute_url }}">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+1p:wght@300;400;500;700&display=swap" rel="stylesheet">

<!-- 共通CSS -->
<link rel="stylesheet" href="{{ '/assets/css/common-layout.css' | relative_url }}">

<!-- ページ固有CSS -->
{% if page.css %}
<link rel="stylesheet" href="{{ page.css | relative_url }}">
{% endif %}

<!-- 製品ナビCSS -->
{% if page.product_nav %}
  {% if page.layout == "default-sumi" %}
  <link rel="stylesheet" href="{{ '/assets/css/product-nav-sumi.css' | relative_url }}">
  {% else %}
  <link rel="stylesheet" href="{{ '/assets/css/product-nav.css' | relative_url }}">
  {% endif %}
{% endif %}

<!-- 構造化データ -->
{% if page.structured_data %}
<script type="application/ld+json">
{{ page.structured_data | jsonify }}
</script>
{% endif %}

<script src="https://cdn.jsdelivr.net/npm/iconify-icon@2.3.0/dist/iconify-icon.min.js"></script>

{% if page.js %}
  <script src="{{ page.js | relative_url }}" defer></script>
{% endif %}
