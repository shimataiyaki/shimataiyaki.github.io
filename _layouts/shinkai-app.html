<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} | Shinkai</title>
  <link rel="stylesheet" href="{{ '/assets/css/shinkai-app.css' | relative_url }}">
  {% if page.css %}
  <link rel="stylesheet" href="{{ page.css | relative_url }}">
  {% endif %}
  <script src="https://cdn.jsdelivr.net/npm/iconify-icon@2.3.0/dist/iconify-icon.min.js"></script>
</head>
<body>
  <header class="app-header">
    <div class="app-logo">
      <a href="/shinkai/">Shinkai</a>
    </div>
    <span class="app-version">v1.0</span>
  </header>

  <main class="app-main">
    {{ content }}
  </main>

  <footer class="app-footer">
    <div class="footer-links">
      <a href="/about/">運営者情報</a>
      <a href="https://docs.google.com/forms/d/e/1FAIpQLSfYwSZ4wEkD2Tz7tkcC5Akac3vQ9VS0GUUAdo1Z4UOD0Zo47g/viewform?usp=publish-editor" target="_blank" rel="noopener">お問い合わせ</a>
    </div>
    <div class="footer-sns">
      <a href="https://x.com/shimataiyaki" target="_blank" rel="noopener" aria-label="X">
        <iconify-icon icon="simple-icons:x" width="18" height="18"></iconify-icon>
      </a>
      <a href="https://github.com/shimataiyaki" target="_blank" rel="noopener" aria-label="GitHub">
        <iconify-icon icon="simple-icons:github" width="18" height="18"></iconify-icon>
      </a>
    </div>
    <p class="footer-copy">© 2026 Shimataiyaki</p>
  </footer>

  {% if page.js %}
  <script src="{{ page.js | relative_url }}" defer></script>
  {% endif %}
</body>
</html>
