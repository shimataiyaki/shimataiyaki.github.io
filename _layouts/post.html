---
layout: default
---
<main class="main-content">
    <section class="section-ec">
        <nav class="breadcrumb">
            <a href="{{ '/blog/' | relative_url }}">ブログ</a>
            <span>›</span>
            <span>{{ page.title }}</span>
        </nav>

        <p class="doc-meta">{{ page.date | date: "%Y年%m月%d日" }}</p>
        <h1>{{ page.title }}</h1>

        <div class="doc-body">
            {{ content }}
        </div>
    </section>
</main>
