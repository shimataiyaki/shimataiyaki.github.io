---
layout: shinkai-app
title: Shinkai Dashboard
js: /assets/js/shinkai-dashboard.js
---

<div id="loading-view">
  <article>
    <h2>Dashboard</h2>
    <p aria-busy="true">読み込み中...</p>
  </article>
</div>

<div id="dashboard-view" style="display:none;">
  
  <!-- プロジェクトサマリー -->
  <article>
    <div style="display:flex; justify-content:space-between; align-items:flex-start;">
      <h2 id="proj-name">--</h2>
      <span class="proj-id-badge" id="proj-id-display"></span>
    </div>
    <div style="display:flex; gap:1rem; font-size:0.85rem; color:var(--pico-muted-color);">
      <span id="proj-vision"></span>
    </div>
    <hr>
    <div>
      <label>Progress</label>
      <progress id="progress-bar" value="0" max="100"></progress>
      <small id="progress-text">0% (0/0)</small>
    </div>
  </article>

  <!-- タスク一覧 -->
  <article>
    <h3>Tasks</h3>
    <div class="task-list" id="task-list">
      <!-- 動的挿入 -->
    </div>
  </article>

</div>

<div id="error-view" style="display:none;">
  <article>
    <h2>Dashboard</h2>
    <p>読み込みに失敗しました。</p>
    <p id="error-message"></p>
    <button onclick="location.reload()">再試行</button>
  </article>
</div>
