<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mendako BBS</title>
  <!-- 修正: src を href に変更 -->
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/x-icon" href="https://shimataiyaki.github.io/images/favicon.ico">
  <link rel="manifest" href="/mendako-bbs/manifest.json">
</head>
<body>
  <header class="site-header">
    <div class="header-container">
      <a href="#" class="site-title">Mendako BBS</a>
    </div>
  </header>

  <div class="container">
    <p><strong>タイムライン</strong></p>
    <p style="color: var(--muted-text); font-size: 0.85rem; margin: 1rem 0 0.5rem;">
      投稿は自動で暗号化され、安全に保管されます。Escキーで緊急脱出。
    </p>
    <div id="posts"></div>
    <div id="pagination" class="pagination" style="display: none;"></div>
  </div>

  <footer class="fixed-footer">
    <div class="footer-inner">
      <div class="input-row">
        <textarea id="message" placeholder="メッセージを入力" required></textarea>
        <button id="submit" class="btn">送信</button>
      </div>
      <div class="copyright">
        © Shimataiyaki |
        <a id="help-btn" class="help-link" title="使い方">info</a>
      </div>
    </div>
  </footer>

  <div id="help-modal" class="modal-overlay">
    <div class="modal-content">
      <h3>Mendako BBS について</h3>
      <p><strong>緊急脱出:</strong> Escキーを押すと、即座に Google Classroom へ移動します。</p>
      <p><strong>暗号化:</strong> 投稿内容は自動で暗号化され、スプレッドシート上では読めません。ただし、絶対的な秘密保持を保証するものではありません。</p>
      <p><strong>プライバシー:</strong> 名前は自動生成され、タブを閉じるとリセットされます。</p>
      <button id="close-help" class="btn modal-close-btn">閉じる</button>
    </div>
  </div>

  <iframe name="hidden_iframe" style="display:none;"></iframe>

  <script src="js/lib/crypto-js.min.js"></script>
  <script src="js/bbs.js"></script>
</body>
</html>
