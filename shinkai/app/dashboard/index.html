<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shinkai Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=M+PLUS+1p:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/common-layout.css">
  <link rel="stylesheet" href="dashboard.css">
</head>
<body>
  <header class="site-header">
    <div class="header-container">
      <a href="/shinkai/" class="site-title">Shinkai</a>
      <span class="header-version">Dashboard</span>
    </div>
  </header>

  <main class="main-content">
    <nav class="breadcrumb">
      <a href="/shinkai/">Shinkai</a>
      <span>›</span>
      <span>Dashboard ログイン</span>
    </nav>

    <div class="auth-card">
      <h2>Dashboard</h2>
      <p class="auth-description">
        Shinkai ID を入力
      </p>
      
      <div class="form-group">
        <label for="shinkaiId">Shinkai ID</label>
        <input type="text" id="shinkaiId" placeholder="proj-2026-sch-001" autocomplete="off">
      </div>
      
      <button onclick="login()" class="btn-secondary">ログイン</button>
      <p id="error" class="error-message"></p>
    </div>

    <div class="auth-card" style="margin-top: 1.5rem; border-color: var(--border-color); background: var(--gray-bg);">
      <p style="font-size: 0.85rem; color: var(--muted-text); margin: 0;">
        Shinkai ID をお持ちでない方は、まず <a href="/shinkai/app/vision-planner/">Vision Planner</a> でプロジェクトを作成してください。
      </p>
    </div>

    <p style="font-size:0.8rem; color:var(--muted-text); text-align:center; margin-top:1rem;">
      ※ e-colleague をご利用中の方は<a href="/e-colleague/portal">こちら</a>
    </p>
  </main>

  <script src="dashboard.js"></script>
</body>
</html>
