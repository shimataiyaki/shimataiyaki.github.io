<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shinkai Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=M+PLUS+1p:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/common-layout.css">
  <link rel="stylesheet" href="dashboard.css">
</head>
<body>
  <header class="site-header">
    <div class="header-container">
      <a href="/shinkai/" class="site-title">Shinkai</a>
      <span class="header-version">Dashboard</span>
    </div>
  </header>

  <main class="main-content">
    <nav class="breadcrumb">
      <a href="index.html">Dashboard</a>
      <span>›</span>
      <span id="breadcrumb-proj-id">プロジェクト</span>
    </nav>

    <!-- プロジェクトサマリー -->
    <section class="dashboard-section">
      <div class="dashboard-card">
        <div class="card-header">
          <h2 id="proj-name">プロジェクト名</h2>
          <span class="proj-id-badge" id="proj-id-display">proj-xxxx</span>
        </div>
        <div class="card-body">
          <div class="info-row">
            <span class="info-label">ビジョン</span>
            <span id="proj-vision">-</span>
          </div>
          <div class="info-row">
            <span class="info-label">及第点</span>
            <span id="proj-min-success">-</span>
          </div>
        </div>
      </div>
    </section>

    <!-- 進捗 -->
    <section class="dashboard-section">
      <div class="dashboard-card">
        <h3>進捗</h3>
        <div class="progress-container">
          <div class="progress-bar" id="progress-bar" style="width: 0%;"></div>
        </div>
        <p class="progress-text" id="progress-text">0% 完了（0/0）</p>
        <p class="progress-next" id="progress-next"></p>
      </div>
    </section>

    <!-- 停滞アラート -->
    <section class="dashboard-section" id="alert-section" style="display:none;">
      <div class="dashboard-card dashboard-card--alert">
        <h3>停滞アラート</h3>
        <ul id="alert-list"></ul>
      </div>
    </section>

    <!-- タスク一覧 -->
    <section class="dashboard-section">
      <div class="dashboard-card">
        <h3>📋 全タスク</h3>
        <div class="table-container">
          <table class="task-table">
            <thead>
              <tr>
                <th>タスク</th>
                <th>担当者</th>
                <th>期限</th>
                <th>状態</th>
              </tr>
            </thead>
            <tbody id="task-list">
              <tr><td colspan="4">タスクがありません</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </section>

    <!-- 担当者別タスク数 -->
    <section class="dashboard-section">
      <div class="dashboard-card">
        <h3>担当者別タスク数</h3>
        <div class="assignee-grid" id="assignee-grid">
          <p>データがありません</p>
        </div>
      </div>
    </section>

  </main>

  <script src="dashboard.js"></script>
</body>
</html>
