---
layout: shinkai-app
title: Shinkai
js: /assets/js/shinkai-app.js
---

<!-- ログイン画面（ID未記憶時） -->
<div id="login-view">
  <div class="auth-card">
    <h2>Shinkai</h2>
    <p class="auth-description">チーム運営を、もっとシステマチックに。</p>
    
    <div class="form-group">
      <label for="shinkaiId">Shinkai ID</label>
      <input type="text" id="shinkaiId" placeholder="proj2026sch001">
      <div class="id-memory">
        <input type="checkbox" id="rememberId" checked>
        <label for="rememberId">IDを記憶する</label>
      </div>
    </div>
    
    <div class="auth-actions">
      <button id="login-btn" class="btn-primary">ログイン</button>
    </div>
    
    <p style="margin-top:1.5rem; font-size:0.85rem; color:var(--shinkai-text-muted);">
      Shinkai ID をお持ちでない方は、<br>
      <a href="/shinkai/app/new/" style="color:var(--shinkai-accent);">新規プロジェクト</a> からIDを発行してください。
    </p>
    
    <p id="error" class="error-message"></p>
  </div>
</div>

<!-- 機能一覧（ID記憶済み時） -->
<div id="home-view" style="display:none;">
  <div class="auth-card">
    <h2>Shinkai</h2>
    <p class="auth-description">チーム運営を、もっとシステマチックに。</p>
    
    <p style="font-size:0.85rem; color:var(--shinkai-text-muted); margin-bottom:1rem;">
      現在のプロジェクト：<strong id="current-id-display" style="color:var(--shinkai-accent);"></strong>
    </p>
    
    <div class="tile-grid">
      <a href="#" class="tile" id="tile-dashboard">
        <span class="tile-icon">Dashboard</span>
        <span class="tile-title">ダッシュボード</span>
        <span class="tile-desc">進捗・タスク確認</span>
      </a>
      <a href="/shinkai/app/new/" class="tile">
        <span class="tile-icon">New</span>
        <span class="tile-title">新規プロジェクト</span>
        <span class="tile-desc">別の Shinkai ID を発行</span>
      </a>
      <div class="tile tile--disabled">
        <span class="tile-icon">Role</span>
        <span class="tile-title">権限設計</span>
        <span class="tile-desc">準備中</span>
      </div>
      <div class="tile tile--disabled">
        <span class="tile-icon">Review</span>
        <span class="tile-title">ふり返り</span>
        <span class="tile-desc">準備中</span>
      </div>
    </div>
    
    <p style="margin-top:1.5rem; font-size:0.8rem; color:var(--shinkai-text-muted);">
      <a href="#" id="logout-link" style="color:var(--shinkai-text-muted);">別のIDでログイン</a>
    </p>
  </div>
</div>
