    <!-- Marked.js CDN (Markdown → HTML変換) -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        /* aboutページ特有のスタイル補足 */
        #md-content {
            max-width: 720px;
            margin: 0 auto 3rem;
            text-align: left;
            line-height: 1.9;
        }
        #md-content h2 {
            font-size: 1.6rem;
            font-weight: 600;
            color: var(--accent-color);
            margin: 2.5rem 0 1rem;
            padding-bottom: 0.3rem;
            border-bottom: 2px solid var(--accent-color);
            display: inline-block;
        }
        #md-content h3 {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--text-color);
            margin: 1.8rem 0 0.5rem;
        }
        #md-content p {
            margin-bottom: 1rem;
        }
        #md-content ul,
        #md-content ol {
            margin: 0.5rem 0 1rem 1.5rem;
        }
        #md-content li {
            margin-bottom: 0.4rem;
        }
        #md-content a {
            color: var(--accent-color);
            text-decoration: none;
            border-bottom: 1px dotted var(--accent-color);
        }
        #md-content a:hover {
            border-bottom: 1px solid var(--accent-color);
        }
        #md-content code {
            background: #f1f5f9;
            padding: 0.2em 0.4em;
            border-radius: 4px;
            font-size: 0.9em;
            font-family: 'Courier New', monospace;
        }
        #md-content pre {
            background: #f8fafc;
            border: 1px solid var(--border-color);
            padding: 1rem 1.2rem;
            overflow-x: auto;
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            line-height: 1.6;
            margin: 1rem 0 1.5rem;
            border-radius: 0;
        }
        #md-content table {
            width: 100%;
            border-collapse: collapse;
            margin: 1rem 0 1.5rem;
            font-size: 0.95rem;
        }
        #md-content th,
        #md-content td {
            border: 1px solid var(--border-color);
            padding: 0.7rem 0.8rem;
            text-align: left;
        }
        #md-content th {
            background: #f8fafc;
            font-weight: 600;
            color: var(--text-color);
        }
        #md-content hr {
            border: none;
            border-top: 1px solid var(--border-color);
            margin: 2rem 0;
        }
        /* システムフロー図の専用表示 */
        .flow-md {
            background: #fafafa;
            padding: 1.2rem 1.5rem;
            border-left: 4px solid var(--accent-color);
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            white-space: pre;
            margin: 0.5rem 0 1.5rem;
        }
    </style>
</head>
<body>

    <!-- 固定ヘッダー（共通） -->

                </div>
            </ul>

    </header>

    <!-- メインコンテンツ -->
    <main class="app-main">
        <div class="container">
            <!-- README.md がここに動的に挿入される -->
            <div id="md-content"></div>
            <!-- フッター -->
            <footer class="app-footer">
                <span>© 2026 Shimataiyaki</span>
            </footer>
        </div>
    </main>

    <!-- 共通スクリプト（ハンバーガーメニュー等） -->
    <script src="script.js"></script>
    <script>
        // リポジトリの README.md を取得して表示
        fetch('https://raw.githubusercontent.com/shimataiyaki/digital-omikuji-app/main/README.md')
            .then(response => {
                if (!response.ok) {
                    throw new Error('README.md を読み込めませんでした');
                }
                return response.text();
            })
            .then(markdown => {
                const mdContainer = document.getElementById('md-content');
                // marked.js で変換し、プレースホルダーを置換（システムフロー図など）
                let html = marked.parse(markdown);
                // もし ```text ブロックがあれば、独自クラスを付与する簡易処理
                html = html.replace(/<pre><code>/g, '<pre class="flow-md"><code>');
                mdContainer.innerHTML = html;
            })
            .catch(error => {
                document.getElementById('md-content').innerHTML = 
                    '<p style="color:#ad241f;">⚠️ READMEの読み込みに失敗しました。後ほど再読み込みしてください。</p>';
                console.error(error);
            });
    </script>
</body>
</html>
